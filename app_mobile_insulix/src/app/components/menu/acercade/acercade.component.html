<ion-header class="ion-no-border">
  <div class="header-container">
    <div class="header-content">
      <ion-buttons slot="start">
        <ion-back-button default-href="#" color="light"></ion-back-button>
      </ion-buttons>
      <ion-text>
        <h1>Acerca de</h1>
      </ion-text>
    </div>
  </div>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="content-container">

    <div class="version-text">
      <ion-text>
        <h2>“Versión 3.0”</h2>
      </ion-text>
    </div>

    <ion-grid class="tech-grid">
      <ion-row>
        <ion-col size="6" class="ion-text-center">
          <ion-icon name="logo-ionic" class="tech-icon"></ion-icon>
        </ion-col>
        <ion-col size="6" class="ion-text-center">
          <ion-icon name="logo-python" class="tech-icon"></ion-icon>
        </ion-col>
      </ion-row>

      <ion-row>
        <ion-col size="6" class="ion-text-center">
          <ion-icon name="logo-css3" class="tech-icon"></ion-icon>
        </ion-col>
        <ion-col size="6" class="ion-text-center">
          <ion-icon name="logo-javascript" class="tech-icon"></ion-icon>
        </ion-col>
      </ion-row>

      <ion-row>
        <ion-col size="6" class="ion-text-center">
          <ion-icon name="shield-checkmark" class="tech-icon"></ion-icon>
        </ion-col>
        <ion-col size="6" class="ion-text-center">
          <ion-icon name="server" class="tech-icon"></ion-icon>
        </ion-col>
      </ion-row>

      <ion-row class="ion-justify-content-center">
        <ion-col size="12" class="ion-text-center">
          <div class="android-icon-wrapper">
            <ion-icon name="logo-android" class="tech-icon android-icon"></ion-icon>
          </div>
        </ion-col>
      </ion-row>
    </ion-grid>

  </div>
</ion-content>
