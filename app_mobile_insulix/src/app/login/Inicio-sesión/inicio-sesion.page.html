<ion-content [fullscreen]="true" class="login-content">
  <div class="header-image">
    <img src="assets/images/insulix-loogo.png" alt="Insulix Logo" class="brand-logo" />
  </div>

  <div class="login-container">
    <div class="header-text">
      <h2>¡Bienvenido!</h2>
      <p>Ingresa tus datos para iniciar sesión</p>
    </div>

    <form #loginForm="ngForm" (ngSubmit)="login()">
      <div class="input-group">
        <label>Correo Electrónico</label>
        <ion-item lines="none" class="custom-input" [class.input-error]="mail.invalid && mail.dirty">
          <ion-icon name="mail-outline" slot="start"></ion-icon>
          <ion-input 
            type="email" 
            name="email" 
            [(ngModel)]="loginData.email"
            #mail="ngModel"
            required 
            email
            placeholder="correo@ejemplo.com">
          </ion-input>
        </ion-item>
        <div class="error-container" *ngIf="mail.invalid && mail.dirty">
          <span class="error-message" *ngIf="mail.errors?.['required']">El correo es obligatorio</span>
          <span class="error-message" *ngIf="mail.errors?.['email']">Formato de correo inválido</span>
        </div>
      </div>

      <div class="input-group">
        <label>Contraseña</label>
        <ion-item lines="none" class="custom-input" [class.input-error]="pass.invalid && pass.dirty">
          <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
          <ion-input 
            type="password" 
            name="password" 
            [(ngModel)]="loginData.password"
            #pass="ngModel"
            required
            minlength="8"
            placeholder="Escribe aquí tu contraseña">
            <ion-input-password-toggle slot="end" color="secondary"></ion-input-password-toggle>
          </ion-input>
        </ion-item>
        <div class="error-container" *ngIf="pass.invalid && pass.dirty">
          <span class="error-message" *ngIf="pass.errors?.['required']">La contraseña es obligatoria</span>
          <span class="error-message" *ngIf="pass.errors?.['minlength']">Mínimo 8 caracteres</span>
        </div>
      </div>

      <div class="options-row">
        <ion-checkbox mode="md" labelPlacement="end">Recordarme</ion-checkbox>
        <a class="forgot-password" routerLink="/reestablecer-contrasenia">¿Olvidaste tu contraseña?</a>
      </div>

      <ion-button 
        expand="block" 
        shape="round" 
        class="login-btn" 
        type="submit" 
        [disabled]="loginForm.invalid">
        Iniciar sesión
      </ion-button>
    </form>

    <div class="signup-link">
      <p>¿Eres médico? <a routerLink="/registro-medico">Regístrate</a></p>
    </div>
  </div>
</ion-content>
